<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalicharan Upadhayay | Portfolio Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/your-font-awesome-kit.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="glass-container">
        <header>
            <nav>
                <div class="logo">KU.AI</div>
                <ul>
                    <li><a href="#about">About</a></li>
                    <li><a href="#skills">Skills</a></li>
                    <li><a href="#projects">Projects</a></li>
                    <li><a href="#contact">Contact</a></li>
                </ul>
            </nav>
        </header>

        <main>
            <section class="hero">
                <div class="hero-content">
                    <h1>Kalicharan Upadhayay</h1>
                    <p class="tagline">AI Engineer & Data Science Trainer</p>
                    <div class="hero-btns">
                        <a href="https://github.com/akashupadhayay106-au" class="btn primary">View GitHub</a>
                        <a href="#contact" class="btn secondary">Hire Me</a>
                    </div>
                </div>
                <div class="hero-visual">
                    <!-- 3D or Animated SVG visual would go here -->
                    <div class="floating-data-card">
                        <span>98% Accuracy</span>
                        <div class="bar"></div>
                    </div>
                </div>
            </section>

            <section id="stats" class="stats-grid">
                <div class="stat-card">
                    <h3>50+</h3>
                    <p>Students Mentored</p>
                </div>
                <div class="stat-card">
                    <h3>20+</h3>
                    <p>AI Projects</p>
                </div>
                <div class="stat-card">
                    <h3>100%</h3>
                    <p>Code Quality</p>
                </div>
            </section>
        </main>
    </div>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>
</body>
</html>
